# config/defaults.yaml — Global defaults for OpenClaw Voice
# Override per-agent settings in config/agents.yaml

voice:
  default_agent: default
  stt_model_size: small
  stt_device: cpu
  stt_compute_type: int8
  stt_beam_size: 1

server:
  web_port: 7890
  session_cookie_secure: true

timeouts:
  gateway:
    connect: 10.0
    read: 90.0
    write: 10.0
  tools:
    connect: 3.0
    read: 10.0
    write: 3.0
