# config/agents.yaml — Agent definitions for OpenClaw Voice
# Each agent maps to an OpenClaw agent ID

agents:
  reaper:
    display_name: "Reaper"
    emoji: "⚔️"
    language: en
    voice:
      provider: elevenlabs
      voice_id: pNInz6obpgDQGcFmaJgB
      model: eleven_turbo_v2_5
    llm:
      mode: gateway
      model: anthropic/claude-sonnet-4-6

  sevro:
    display_name: "Sevro"
    emoji: "🐺"
    language: en
    voice:
      provider: elevenlabs
      voice_id: pNInz6obpgDQGcFmaJgB
      model: eleven_turbo_v2_5
    llm:
      mode: codex_proxy
      model: codex-proxy/gpt-5.5
      models:
        primary: codex-proxy/gpt-5.5
        fallbacks:
          - codex-proxy/gpt-5.4-mini
          - codex-proxy/gpt-4o-mini

  default:
    display_name: "Assistant"
    emoji: "🤖"
    language: en
    voice:
      provider: elevenlabs
      voice_id: pNInz6obpgDQGcFmaJgB
      model: eleven_turbo_v2_5
    llm:
      mode: gateway
      model: anthropic/claude-sonnet-4-6

default_user:
  agents: [reaper, sevro, default]
  default: reaper
